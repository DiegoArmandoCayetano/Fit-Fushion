<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>

    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container">

    <h1>Registro</h1>

    <form th:action="@{/auth/register-form}" method="post">

        <input
                type="text"
                name="nombre"
                placeholder="Nombre"
                required
        >

        <input
                type="email"
                name="email"
                placeholder="Correo"
                required
        >

        <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
        >

        <button type="submit">
            Registrarse
        </button>

    </form>

</div>

</body>
</html>
